<div class="app-modal{% if modal_classes %} {{ modal_classes }}{% endif %}" id="{{ modal_id }}" aria-hidden="true">
    <div class="app-modal__overlay" data-modal-close></div>
    <section class="app-modal__dialog{% if dialog_classes %} {{ dialog_classes }}{% endif %}" role="dialog" aria-modal="true" aria-labelledby="{% if aria_labelledby %}{{ aria_labelledby }}{% else %}{{ modal_id }}-title{% endif %}">
        <button type="button" class="app-modal__close" data-modal-close aria-label="{{ aria_label|default:'Закрыть окно' }}">
            <span class="material-icons-sharp">close</span>
        </button>

        {% if not hide_header %}
        <div class="app-modal__header">
            {% if eyebrow %}
            <span class="app-modal__eyebrow">{{ eyebrow }}</span>
            {% endif %}
            <h2 class="app-modal__title" id="{{ modal_id }}-title">{{ title }}</h2>
            {% if subtitle %}
            <p class="app-modal__subtitle">{{ subtitle }}</p>
            {% endif %}
        </div>
        {% endif %}

        {% include body_template %}
    </section>
</div>
