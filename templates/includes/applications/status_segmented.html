<div class="applications-status-nav">
    <form method="get" id="{{ form_id }}" data-applications-status-form class="applications-segmented" data-active-status="{{ selected_status }}" role="tablist" aria-label="Статус заявок">
        {% if selected_department %}
        <input type="hidden" name="department" value="{{ selected_department }}">
        {% endif %}
        <span class="applications-segmented__thumb" aria-hidden="true"></span>
        <button type="button" name="status" value="all" data-status-key="all" class="applications-segmented__item {% if selected_status == 'all' %}active{% endif %}">
            <span>Все</span>
        </button>
        <button type="button" name="status" value="pending" data-status-key="pending" class="applications-segmented__item {% if selected_status == 'pending' %}active{% endif %}">
            <span>В ожидании</span>
        </button>
        <button type="button" name="status" value="approved" data-status-key="approved" class="applications-segmented__item {% if selected_status == 'approved' %}active{% endif %}">
            <span>Одобрено</span>
        </button>
        <button type="button" name="status" value="rejected" data-status-key="rejected" class="applications-segmented__item {% if selected_status == 'rejected' %}active{% endif %}">
            <span>Отклонено</span>
        </button>
    </form>
</div>
