{% if badge %}
<span class="new-hire-badge"
      data-schedule-status-tooltip
      data-schedule-status-variant="{{ badge.variant|default:'medium' }}"
      data-tooltip-title="{{ badge.tooltip_title }}"
      data-tooltip-text="{{ badge.tooltip_text }}"
      title="{{ badge.tooltip_title }}: {{ badge.tooltip_text }}"
      aria-label="{{ badge.label }}: {{ badge.tooltip_text }}"
      role="img">
    <span class="material-icons-sharp" aria-hidden="true">{{ badge.icon|default:'person_add' }}</span>
</span>
{% endif %}
