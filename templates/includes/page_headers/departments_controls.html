<div class="page-hero__toolset page-hero__toolset--departments">
    <div class="department-summary-card" aria-label="Всего отделов: {{ departments_count }}">
        <div class="department-summary-card__icon" aria-hidden="true">
            <span class="material-icons-sharp">diversity_2</span>
        </div>
        <div class="department-summary-card__content">
            <span class="department-summary-card__label">Всего отделов</span>
            <strong class="department-summary-card__value">{{ departments_count }}</strong>
        </div>
    </div>

    {% if can_create_department %}
    <button type="button" class="employee-action-button employee-action-button--departments" data-modal-open="department-create-modal">
        Создать отдел
    </button>
    {% endif %}
</div>
