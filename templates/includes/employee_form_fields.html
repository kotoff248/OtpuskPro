<div class="employee-modal__fields">
    <div class="employee-modal__field">
        <label for="{{ form_prefix }}_login">Логин</label>
        <input type="text" id="{{ form_prefix }}_login" name="login" value="{{ employee.login|default:'' }}" autocomplete="username" autocapitalize="off" spellcheck="false" required>
    </div>

    <div class="employee-modal__field">
        <label for="{{ form_prefix }}_last_name">Фамилия</label>
        <input type="text" id="{{ form_prefix }}_last_name" name="last_name" value="{{ employee.last_name|default:'' }}" autocomplete="family-name" required>
    </div>

    <div class="employee-modal__field">
        <label for="{{ form_prefix }}_first_name">Имя</label>
        <input type="text" id="{{ form_prefix }}_first_name" name="first_name" value="{{ employee.first_name|default:'' }}" autocomplete="given-name" required>
    </div>

    <div class="employee-modal__field">
        <label for="{{ form_prefix }}_middle_name">Отчество</label>
        <input type="text" id="{{ form_prefix }}_middle_name" name="middle_name" value="{{ employee.middle_name|default:'' }}" autocomplete="additional-name" required>
    </div>

    <div class="employee-modal__field">
        <label for="{{ form_prefix }}_position">Должность</label>
        <input type="text" id="{{ form_prefix }}_position" name="position" value="{{ employee.position|default:'' }}" autocomplete="organization-title" required>
    </div>

    <div class="employee-modal__field employee-modal__field--date" data-date-field>
        <label for="{{ form_prefix }}_date_joined">Дата начала работы</label>
        <input type="date" id="{{ form_prefix }}_date_joined" name="date_joined" value="{{ employee.date_joined|date:'Y-m-d' }}" required>
    </div>

    {% if show_manager_fields %}
    <div class="employee-modal__field employee-modal__field--select">
        <label for="{{ form_prefix }}_role">Роль в системе</label>
        <div class="employee-select employee-select--modal" data-employee-select>
            <select id="{{ form_prefix }}_role" name="role" class="employee-select__native" required>
                <option value="employee" {% if employee.role == 'employee' or not employee.role %}selected{% endif %}>Сотрудник</option>
                <option value="hr" {% if employee.role == 'hr' %}selected{% endif %}>HR</option>
                <option value="department_head" {% if employee.role == 'department_head' %}selected{% endif %}>Руководитель отдела</option>
                <option value="enterprise_head" {% if employee.role == 'enterprise_head' %}selected{% endif %}>Руководитель предприятия</option>
            </select>
            <button type="button" class="employee-select__trigger" data-employee-select-trigger aria-haspopup="listbox" aria-expanded="false">
                <span class="employee-select__value" data-employee-select-value>
                    {% if employee.role == 'hr' %}
                    HR
                    {% elif employee.role == 'department_head' %}
                    Руководитель отдела
                    {% elif employee.role == 'enterprise_head' %}
                    Руководитель предприятия
                    {% else %}
                    Сотрудник
                    {% endif %}
                </span>
                <span class="material-icons-sharp">expand_more</span>
            </button>
            <div class="employee-select__menu" data-employee-select-menu role="listbox">
                <button type="button" class="employee-select__option {% if employee.role == 'employee' or not employee.role %}is-selected{% endif %}" data-employee-select-option data-value="employee" role="option" aria-selected="{% if employee.role == 'employee' or not employee.role %}true{% else %}false{% endif %}">
                    Сотрудник
                </button>
                <button type="button" class="employee-select__option {% if employee.role == 'hr' %}is-selected{% endif %}" data-employee-select-option data-value="hr" role="option" aria-selected="{% if employee.role == 'hr' %}true{% else %}false{% endif %}">
                    HR
                </button>
                <button type="button" class="employee-select__option {% if employee.role == 'department_head' %}is-selected{% endif %}" data-employee-select-option data-value="department_head" role="option" aria-selected="{% if employee.role == 'department_head' %}true{% else %}false{% endif %}">
                    Руководитель отдела
                </button>
                <button type="button" class="employee-select__option {% if employee.role == 'enterprise_head' %}is-selected{% endif %}" data-employee-select-option data-value="enterprise_head" role="option" aria-selected="{% if employee.role == 'enterprise_head' %}true{% else %}false{% endif %}">
                    Руководитель предприятия
                </button>
            </div>
        </div>
    </div>

    <div class="employee-modal__field">
        <label for="{{ form_prefix }}_annual_paid_leave_days">Годовая норма оплачиваемого отпуска</label>
        <input type="number" id="{{ form_prefix }}_annual_paid_leave_days" name="annual_paid_leave_days" value="{{ employee.annual_paid_leave_days|default:52 }}" min="0" max="52" step="1" inputmode="numeric" required>
    </div>

    <div class="employee-modal__field employee-modal__field--select">
        <label for="{{ form_prefix }}_department">Отдел</label>
        <div class="employee-select employee-select--modal" data-employee-select>
            <select id="{{ form_prefix }}_department" name="department" class="employee-select__native" {% if departments %}required{% else %}disabled aria-disabled="true"{% endif %}>
                {% if departments %}
                    {% for department in departments %}
                    <option value="{{ department.id }}" {% if employee.department and department.id == employee.department.id %}selected{% elif not employee.department and forloop.first %}selected{% endif %}>
                        {{ department.name }}
                    </option>
                    {% endfor %}
                {% else %}
                <option value="">Нет доступных отделов</option>
                {% endif %}
            </select>
            <button type="button" class="employee-select__trigger" data-employee-select-trigger aria-haspopup="listbox" aria-expanded="false" {% if not departments %}disabled{% endif %}>
                <span class="employee-select__value" data-employee-select-value>
                    {% if departments %}
                        {% if employee.department %}
                        {{ employee.department.name }}
                        {% else %}
                            {% for department in departments %}
                                {% if forloop.first %}
                        {{ department.name }}
                                {% endif %}
                            {% endfor %}
                        {% endif %}
                    {% else %}
                    Нет доступных отделов
                    {% endif %}
                </span>
                <span class="material-icons-sharp">expand_more</span>
            </button>
            <div class="employee-select__menu" data-employee-select-menu role="listbox">
                {% if departments %}
                    {% for department in departments %}
                    <button type="button" class="employee-select__option {% if employee.department and department.id == employee.department.id or not employee.department and forloop.first %}is-selected{% endif %}" data-employee-select-option data-value="{{ department.id }}" role="option" aria-selected="{% if employee.department and department.id == employee.department.id or not employee.department and forloop.first %}true{% else %}false{% endif %}">
                        {{ department.name }}
                    </button>
                    {% endfor %}
                {% else %}
                <span class="employee-select__option is-selected" role="option" aria-selected="true">
                    Нет доступных отделов
                </span>
                {% endif %}
            </div>
        </div>
        {% if not departments %}
        <input type="hidden" data-form-blocker value="department-required">
        <p class="employee-modal__hint">Сначала добавьте хотя бы один отдел, затем вернитесь к форме сотрудника.</p>
        {% endif %}
    </div>
    {% endif %}

    <div class="employee-modal__field employee-modal__field--full">
        <label for="{{ form_prefix }}_password">{% if password_optional %}Новый пароль{% else %}Пароль{% endif %}</label>
        <input type="password" id="{{ form_prefix }}_password" name="password" autocomplete="new-password" {% if not password_optional %}required{% endif %} placeholder="{% if password_optional %}Оставьте пустым, если пароль менять не нужно{% endif %}">
    </div>
</div>
