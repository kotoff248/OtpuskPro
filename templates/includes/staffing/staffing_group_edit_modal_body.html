<form method="post" class="staffing-modal-form" data-employee-form>
    {% csrf_token %}
    <input type="hidden" name="action" value="update_group">
    <input type="hidden" name="department_id" value="{{ department.id }}">
    <input type="hidden" name="group_id" value="{{ group.id }}">

    <div class="staffing-modal__fields">
        <div class="staffing-modal__field">
            <label for="staffing-group-name-{{ group.id }}">Название группы</label>
            <input id="staffing-group-name-{{ group.id }}" name="name" value="{{ group.name }}" required>
        </div>
        <div class="staffing-modal__field">
            <label for="staffing-group-code-{{ group.id }}">Код</label>
            <input id="staffing-group-code-{{ group.id }}" name="code" value="{{ group.code }}" placeholder="Необязательно">
        </div>
    </div>

    <div class="app-modal__actions staffing-modal__actions">
        <button type="button" class="app-modal__button app-modal__button--secondary" data-modal-close>Отмена</button>
        <button type="submit" class="app-modal__button app-modal__button--primary" data-employee-submit disabled>Сохранить группу</button>
    </div>
</form>
