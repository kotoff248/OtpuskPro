<form method="post" class="staffing-modal-form" data-employee-form>
    {% csrf_token %}
    <input type="hidden" name="action" value="update_coverage">
    <input type="hidden" name="department_id" value="{{ department.id }}">
    <input type="hidden" name="coverage_id" value="{{ rule.id }}">

    <div class="staffing-modal__fields">
        <div class="staffing-modal__field staffing-modal__field--full">
            <label for="staffing-coverage-group-{{ rule.id }}">Производственная группа</label>
            <div class="employee-select employee-select--modal staffing-modal-select" data-employee-select>
                <select id="staffing-coverage-group-{{ rule.id }}" name="production_group_id" class="employee-select__native" required>
                    {% for group in department.production_groups.all %}
                    <option value="{{ group.id }}" {% if group.id == rule.production_group_id %}selected{% endif %}>{{ group.name }}</option>
                    {% endfor %}
                </select>
                <button type="button" class="employee-select__trigger" data-employee-select-trigger aria-haspopup="listbox" aria-expanded="false">
                    <span class="employee-select__value" data-employee-select-value>{{ rule.production_group.name }}</span>
                    <span class="material-icons-sharp">expand_more</span>
                </button>
                <div class="employee-select__menu" data-employee-select-menu role="listbox">
                    {% for group in department.production_groups.all %}
                    <button type="button" class="employee-select__option {% if group.id == rule.production_group_id %}is-selected{% endif %}" data-employee-select-option data-value="{{ group.id }}" role="option" aria-selected="{% if group.id == rule.production_group_id %}true{% else %}false{% endif %}">
                        {{ group.name }}
                    </button>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="staffing-modal__field">
            <label for="staffing-coverage-min-{{ rule.id }}">Минимум должно остаться</label>
            <input id="staffing-coverage-min-{{ rule.id }}" type="number" name="min_staff_required" min="0" value="{{ rule.min_staff_required }}" required>
        </div>
        <div class="staffing-modal__field">
            <label for="staffing-coverage-max-{{ rule.id }}">Максимум отсутствующих</label>
            <input id="staffing-coverage-max-{{ rule.id }}" type="number" name="max_absent" min="0" value="{{ rule.max_absent }}" required>
        </div>
        <div class="staffing-modal__field">
            <label for="staffing-coverage-criticality-{{ rule.id }}">Критичность</label>
            <input id="staffing-coverage-criticality-{{ rule.id }}" type="number" name="criticality_level" min="1" max="5" value="{{ rule.criticality_level }}" required>
        </div>
    </div>

    <div class="app-modal__actions staffing-modal__actions">
        <button type="button" class="app-modal__button app-modal__button--secondary" data-modal-close>Отмена</button>
        <button type="submit" class="app-modal__button app-modal__button--primary" data-employee-submit disabled>Сохранить покрытие</button>
    </div>
</form>
