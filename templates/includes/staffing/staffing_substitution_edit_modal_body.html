<form method="post" class="staffing-modal-form" data-employee-form>
    {% csrf_token %}
    <input type="hidden" name="action" value="update_substitution">
    <input type="hidden" name="department_id" value="{{ department.id }}">
    <input type="hidden" name="substitution_id" value="{{ rule.id }}">

    <div class="staffing-modal__fields">
        <div class="staffing-modal__field">
            <label for="staffing-substitution-substitute-{{ rule.id }}">Кто замещает</label>
            <div class="employee-select employee-select--modal staffing-modal-select" data-employee-select>
                <select id="staffing-substitution-substitute-{{ rule.id }}" name="substitute_group_id" class="employee-select__native" required>
                    {% for group in department.production_groups.all %}
                    <option value="{{ group.id }}" {% if group.id == rule.substitute_group_id %}selected{% endif %}>{{ group.name }}</option>
                    {% endfor %}
                </select>
                <button type="button" class="employee-select__trigger" data-employee-select-trigger aria-haspopup="listbox" aria-expanded="false">
                    <span class="employee-select__value" data-employee-select-value>{{ rule.substitute_group.name }}</span>
                    <span class="material-icons-sharp">expand_more</span>
                </button>
                <div class="employee-select__menu" data-employee-select-menu role="listbox">
                    {% for group in department.production_groups.all %}
                    <button type="button" class="employee-select__option {% if group.id == rule.substitute_group_id %}is-selected{% endif %}" data-employee-select-option data-value="{{ group.id }}" role="option" aria-selected="{% if group.id == rule.substitute_group_id %}true{% else %}false{% endif %}">
                        {{ group.name }}
                    </button>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="staffing-modal__field">
            <label for="staffing-substitution-source-{{ rule.id }}">Кого закрывают</label>
            <div class="employee-select employee-select--modal staffing-modal-select" data-employee-select>
                <select id="staffing-substitution-source-{{ rule.id }}" name="source_group_id" class="employee-select__native" required>
                    {% for group in department.production_groups.all %}
                    <option value="{{ group.id }}" {% if group.id == rule.source_group_id %}selected{% endif %}>{{ group.name }}</option>
                    {% endfor %}
                </select>
                <button type="button" class="employee-select__trigger" data-employee-select-trigger aria-haspopup="listbox" aria-expanded="false">
                    <span class="employee-select__value" data-employee-select-value>{{ rule.source_group.name }}</span>
                    <span class="material-icons-sharp">expand_more</span>
                </button>
                <div class="employee-select__menu" data-employee-select-menu role="listbox">
                    {% for group in department.production_groups.all %}
                    <button type="button" class="employee-select__option {% if group.id == rule.source_group_id %}is-selected{% endif %}" data-employee-select-option data-value="{{ group.id }}" role="option" aria-selected="{% if group.id == rule.source_group_id %}true{% else %}false{% endif %}">
                        {{ group.name }}
                    </button>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="staffing-modal__field staffing-modal__field--full">
            <label for="staffing-substitution-capacity-{{ rule.id }}">Сколько отсутствующих закрывает</label>
            <input id="staffing-substitution-capacity-{{ rule.id }}" type="number" name="max_covered_absences" min="1" value="{{ rule.max_covered_absences }}" required>
        </div>
    </div>

    <div class="app-modal__actions staffing-modal__actions">
        <button type="button" class="app-modal__button app-modal__button--secondary" data-modal-close>Отмена</button>
        <button type="submit" class="app-modal__button app-modal__button--primary" data-employee-submit disabled>Сохранить замещение</button>
    </div>
</form>
