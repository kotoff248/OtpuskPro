<form method="post" class="staffing-modal-form" data-employee-form>
    {% csrf_token %}
    <input type="hidden" name="action" value="create_group">
    <input type="hidden" name="department_id" value="{{ department.id }}">

    <div class="staffing-modal__fields">
        <div class="staffing-modal__field">
            <label for="staffing-group-name-{{ department.id }}">Название группы</label>
            <input id="staffing-group-name-{{ department.id }}" name="name" placeholder="Например, Контроль качества" required>
        </div>
        <div class="staffing-modal__field">
            <label for="staffing-group-code-{{ department.id }}">Код</label>
            <input id="staffing-group-code-{{ department.id }}" name="code" placeholder="Необязательно">
        </div>
    </div>

    <div class="app-modal__actions staffing-modal__actions">
        <button type="button" class="app-modal__button app-modal__button--secondary" data-modal-close>Отмена</button>
        <button type="submit" class="app-modal__button app-modal__button--primary" data-employee-submit disabled>Добавить группу</button>
    </div>
</form>
